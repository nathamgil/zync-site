<body>

<div class="scrim" id="scrim"></div>

<div class="app">

  <!-- ================= SIDEBAR ================= -->

      <a href="/" class="logo">
        <svg viewBox="0 0 100 100" aria-hidden="true"><defs><linearGradient id="nz" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#9d7bff"/></linearGradient></defs><path d="M22 20 H78 V33 L45 67 H78 V80 H22 V67 L55 33 H22 Z" fill="url(#nz)"/><circle cx="50" cy="50" r="13" fill="none" stroke="#4dd0e1" stroke-width="2.5"/><circle cx="50" cy="50" r="6" fill="none" stroke="#4dd0e1" stroke-width="2.5"/><circle cx="50" cy="50" r="2" fill="#4dd0e1"/></svg>

<script src="config.js"></script>

<script>
(function () {
'use strict';

var F = ZyncData.Fmt;
var CFG = window.ZYNC_CONFIG;
var D = null;                       // dataset carregado
var el = function (id) { return document.getElementById(id); };

/* ---------- escape obrigatório em tudo que vem do banco ---------- */
function esc(v) {
  if (v == null) return '';
  return String(v).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

/* ============================================================
   GRÁFICOS EM SVG (sem biblioteca externa)
   ============================================================ */

function sparkline(vals, w, h) {
  if (!vals || vals.length < 2) return '';
  var max = Math.max.apply(null, vals), min = Math.min.apply(null, vals);
  var span = (max - min) || 1;
  var pts = vals.map(function (v, i) {
    return [(i / (vals.length - 1)) * w, h - ((v - min) / span) * (h - 4) - 2];
  });
  var d = pts.map(function (p, i) { return (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1); }).join(' ');
  var area = d + ' L' + w + ' ' + h + ' L0 ' + h + ' Z';
  var uid = 'sp' + Math.round(vals[0] * 1000) + vals.length + w;
  return '<svg class="spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    '<defs><linearGradient id="' + uid + '" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="#7c5cff" stop-opacity=".38"/>' +
    '<stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></linearGradient></defs>' +
    '<path d="' + area + '" fill="url(#' + uid + ')"/>' +
    '<path d="' + d + '" fill="none" stroke="#7c5cff" stroke-width="1.6" stroke-linejoin="round"/></svg>';
}

/* barras (investimento) + linha (leads) sobre o mesmo eixo x */
function chartBarLine(serie) {
  if (!serie || !serie.length) return '';
  var W = 720, H = 220, pad = { t: 14, r: 42, b: 26, l: 42 };
  var iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  var maxB = Math.max.apply(null, serie.map(function (s) { return s.invest; })) * 1.15;
  var maxL = Math.max.apply(null, serie.map(function (s) { return s.leads; })) * 1.25;
  var step = iw / serie.length;
  var bw = Math.min(step * 0.52, 26);

  var bars = serie.map(function (s, i) {
    var bh = (s.invest / maxB) * ih;
    var x = pad.l + step * i + (step - bw) / 2;
    return '<rect class="bar" x="' + x.toFixed(1) + '" y="' + (pad.t + ih - bh).toFixed(1) +
           '" width="' + bw.toFixed(1) + '" height="' + bh.toFixed(1) + '" rx="3">' +
           '<title>' + esc(s.dia) + ' · ' + F.brl0(s.invest) + '</title></rect>';
  }).join('');

  var pts = serie.map(function (s, i) {
    return [pad.l + step * i + step / 2, pad.t + ih - (s.leads / maxL) * ih];
  });
  var line = pts.map(function (p, i) { return (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1); }).join(' ');
  var dots = pts.map(function (p, i) {
    return '<circle class="pt" cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3.2">' +
           '<title>' + esc(serie[i].dia) + ' · ' + serie[i].leads + ' leads</title></circle>';
  }).join('');

  var gy = [0, .25, .5, .75, 1].map(function (f) {
    var y = pad.t + ih - f * ih;
    return '<line class="axis" x1="' + pad.l + '" y1="' + y.toFixed(1) + '" x2="' + (W - pad.r) + '" y2="' + y.toFixed(1) + '"/>' +
           '<text class="axis-lbl" x="' + (pad.l - 7) + '" y="' + (y + 3).toFixed(1) + '" text-anchor="end">' + Math.round(maxB * f / 50) * 50 + '</text>' +
           '<text class="axis-lbl" x="' + (W - pad.r + 7) + '" y="' + (y + 3).toFixed(1) + '">' + Math.round(maxL * f) + '</text>';
  }).join('');

  var gx = serie.map(function (s, i) {
    if (serie.length > 8 && i % 2) return '';
    return '<text class="axis-lbl" x="' + (pad.l + step * i + step / 2).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle">' + esc(s.dia) + '</text>';
  }).join('');

  return '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '">' +
    '<defs><linearGradient id="gradBar" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="#7c5cff" stop-opacity=".55"/>' +
    '<stop offset="1" stop-color="#7c5cff" stop-opacity=".14"/></linearGradient></defs>' +
    gy + bars + '<path class="line" d="' + line + '"/>' + dots + gx + '</svg>' +
    '<div class="legend"><span><i style="background:rgba(124,92,255,.55)"></i>Investimento (R$)</span>' +
    '<span><i style="background:#7c5cff"></i>Leads gerados</span></div>';
}

/* barras horizontais simples */
function barsH(itens, campoLabel, campoValor, formatador) {
  if (!itens || !itens.length) return vazio('Sem dados no período.');
  var max = Math.max.apply(null, itens.map(function (i) { return i[campoValor]; })) || 1;
  return '<div class="funnel">' + itens.map(function (it) {
    var pct = (it[campoValor] / max) * 100;
    return '<div class="fn-step">' +
      '<div style="flex:0 0 148px;font-size:.84rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(it[campoLabel]) + '</div>' +
      '<div style="flex:1"><div class="prog"><i style="width:' + pct.toFixed(1) + '%"></i></div></div>' +
      '<div class="fn-meta" style="flex:0 0 auto"><b>' + formatador(it[campoValor]) + '</b></div>' +
    '</div>';
  }).join('') + '</div>';
}

function vazio(txt, cta) {
  return '<div class="empty"><div class="big">◌</div><p>' + esc(txt) + '</p>' +
    (cta ? '<div style="margin-top:16px">' + cta + '</div>' : '') + '</div>';
}

/* ============================================================
   COMPONENTES
   ============================================================ */

function deltaHTML(k) {
  if (k.delta == null) return '';
  var bom = k.inverso ? k.delta < 0 : k.delta > 0;
  var cls = k.neutro ? 'flat' : (Math.abs(k.delta) < 0.5 ? 'flat' : (bom ? 'up' : 'down'));
  var seta = k.delta > 0 ? '▲' : (k.delta < 0 ? '▼' : '■');
  return '<span class="delta ' + cls + '">' + seta + ' ' +
         Math.abs(k.delta).toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + '%</span>';
}

function kpiHTML(k) {
  var valor = F[k.fmt] ? F[k.fmt](k.valor) : k.valor;
  /* a anotação fica ancorada no número que ela explica — interpretação
     com lastro, em vez de um bloco de prosa solto na tela */
  var nota = k.nota ? '<div class="k-nota">' + esc(String(k.nota).slice(0, 200)) + '</div>' : '';
  return '<div class="kpi">' +
    '<div class="k-label">' + esc(k.label) + '</div>' +
    '<div class="k-val grad">' + valor + '</div>' +
    '<div class="k-foot">' + deltaHTML(k) + '<span>' + esc(k.hint || '') + '</span></div>' +
    nota + sparkline(k.spark, 120, 44) +
  '</div>';
}

/* selo de atualização — automático mostra hora, manual mostra o ciclo */
function selo(tipo) {
  if (tipo === 'manual') {
    return '<span class="tb-sync" style="font-size:.68rem"><span class="dot" style="background:var(--accent-2);animation:none"></span> atualizado no fechamento mensal</span>';
  }
  var t = D.periodo && D.periodo.atualizado_em ? D.periodo.atualizado_em : null;
  if (!t) return '';
  var d = String(t).slice(0, 10).split('-'), h = String(t).slice(11, 16);
  return '<span class="tb-sync" style="font-size:.68rem"><span class="dot"></span> atualizado ' +
         d[2] + '/' + d[1] + ' às ' + h + '</span>';
}

function cardHead(titulo, sub, extra) {
  return '<div class="card-head"><h3>' + esc(titulo) + '</h3>' +
    (sub ? '<span class="sub">' + esc(sub) + '</span>' : '') +
    '<span class="spacer"></span>' + (extra || '') + '</div>';
}

var STATUS = {
  concluido:   { cls: 'b-green',  txt: 'concluído' },
  andamento:   { cls: 'b-purple', txt: 'em andamento' },
  pendente:    { cls: 'b-gray',   txt: 'previsto' },
  ativa:       { cls: 'b-green',  txt: 'ativa' },
  pausada:     { cls: 'b-gray',   txt: 'pausada' },
  teste:       { cls: 'b-yellow', txt: 'em teste' },
  novo:        { cls: 'b-blue',   txt: 'novo' },
  qualificado: { cls: 'b-purple', txt: 'qualificado' },
  reuniao:     { cls: 'b-yellow', txt: 'reunião' },
  ganho:       { cls: 'b-green',  txt: 'ganho' },
  perdido:     { cls: 'b-red',    txt: 'perdido' },
  /* pendência do cliente nunca vem em vermelho: o portal destrava a
     operação, não cobra. Item de aprovação não é acusação. */
  alta:        { cls: 'b-yellow', txt: 'prioridade' },
  media:       { cls: 'b-gray',   txt: 'quando puder' },
  baixa:       { cls: 'b-gray',   txt: 'sem pressa' },
};
function badge(k) {
  var s = STATUS[k] || { cls: 'b-gray', txt: k || '—' };
  return '<span class="badge ' + s.cls + '">' + esc(s.txt) + '</span>';
}
/* rótulo livre, para valores que não têm status fixo (canal, plataforma) */
function tag(texto, cor) {
  return '<span class="badge ' + (cor || 'b-blue') + '">' + esc(texto) + '</span>';
}

/* tempo até o primeiro contato — é aqui que se vê se o gargalo é a
   campanha ou o atendimento. Sem julgamento no texto, só na cor. */
function tempoContato(t1) {
  if (!t1) return '<span class="badge b-gray">aguardando</span>';
  var m = /(\d+)\s*h/.exec(t1), min = /(\d+)\s*min/.exec(t1);
  var mins = (m ? parseInt(m[1], 10) * 60 : 0) + (min ? parseInt(min[1], 10) : 0);
  var cor = mins <= 15 ? 'b-green' : (mins <= 60 ? 'b-yellow' : 'b-red');
  return '<span class="badge ' + cor + '">' + esc(t1) + '</span>';
}

function ctaWhats(texto, label) {
  var url = 'https://wa.me/' + CFG.suporte.whatsapp + '?text=' + encodeURIComponent(texto);
  return '<a class="btn btn-primary btn-sm" target="_blank" rel="noopener" href="' + esc(url) + '">' + esc(label) + '</a>';
}

/* Rodapé fixo do portal.
   Declara a propriedade das contas (o medo silencioso de quem contrata
   agência) e a política de dados. A oferta de serviços não contratados
   vive aqui — nunca como aba vazia fingindo ser produto entregue. */
function rodape() {
  var h = '<div class="portal-foot">';

  h += '<p>Todas as contas de anúncio, domínio, hospedagem e analytics citadas neste portal são de ' +
       '<b>propriedade da ' + esc(D.cliente.empresa) + '</b>. A Zync atua exclusivamente como administradora.</p>';

  h += '<p style="margin-top:8px">Os dados exibidos pertencem à sua empresa e são tratados apenas para operar os serviços contratados. ' +
       'Acesso a dados de contato é registrado. Retenção padrão de 90 dias na tela.</p>';

  if (naoContratados.length) {
    h += '<div class="servicos"><span>A Zync também opera:</span>' +
      naoContratados.map(function (s) { return '<span class="chip">' + esc(s) + '</span>'; }).join('') +
      ctaWhats('Olá! Quero saber sobre os outros serviços da Zync para a minha conta.', 'Saber mais') + '</div>';
  }

  return h + '</div>';
}

/* ============================================================
   PÁGINAS
   ============================================================ */

var PAGINAS = [

/* ---------------- VISÃO GERAL ---------------- */
{
  id: 'visao', titulo: 'Visão geral', grupo: 'Operação', icone: 'i-grid',
  sempre: true,
  render: function () {
    var h = '';

    h += '<div class="page-head"><div class="sec-tag">' + esc(D.periodo.label || '') + '</div>' +
         '<h2>Olá, ' + esc((D.cliente.nome || '').split(' ')[0]) + '. Aqui está o mês da ' +
         esc(String(D.cliente.empresa || '').replace(/\.$/, '')) + '.</h2>' +
         '<p>Comparativos contra ' + esc(D.periodo.comparado_com || 'o mês anterior') + '. Os blocos de números são automáticos; os de análise e entrega são publicados pela Zync no fechamento.</p></div>';

    /* KPIs */
    if (D.kpis && D.kpis.length) {
      h += '<div class="grid g-4 mb-24">' + D.kpis.map(kpiHTML).join('') + '</div>';
    }

    /* Leitura do estrategista */
    if (D.leitura) {
      h += '<div class="card mb-24" style="border-color:rgba(124,92,255,.4);background:linear-gradient(160deg,rgba(124,92,255,.07),var(--panel) 55%)">' +
        '<div class="card-head">' +
          '<div class="sb-avatar" style="width:40px;height:40px;border-radius:11px;font-size:.9rem">' + esc(D.leitura.iniciais) + '</div>' +
          '<div><h3 style="font-size:.92rem">' + esc(D.leitura.autor) + '</h3>' +
          '<span class="sub">' + esc(D.leitura.cargo) + ' · leitura de ' + F.data(D.leitura.data) + '</span></div>' +
          '<span class="spacer"></span>' + selo('manual') +
        '</div>' +
        '<h4 style="font-size:1.06rem;margin-bottom:12px;letter-spacing:-.4px">' + esc(D.leitura.titulo) + '</h4>' +
        D.leitura.paragrafos.map(function (p) {
          return '<p style="color:var(--muted);font-size:.9rem;margin-bottom:11px">' + esc(p) + '</p>';
        }).join('') +
      '</div>';
    }

    /* destaques */
    if (D.insights && D.insights.length) {
      h += '<div class="grid g-2 mb-24">' + D.insights.map(function (i) {
        return '<div class="insight"><div class="ico">' + (i.tipo === 'atencao' ? '▲' : '◆') + '</div>' +
          '<div><h4>' + esc(i.titulo) + '</h4><p>' + esc(i.texto) + '</p></div></div>';
      }).join('') + '</div>';
    }

    /* funil + pendências lado a lado */
    h += '<div class="grid g-2 mb-24">';

    if (D.funil && D.funil.length) {
      h += '<div class="card">' + cardHead('Funil do mês', null, selo()) + funilHTML(D.funil) + '</div>';
    }

    if (D.pendencias && D.pendencias.length) {
      h += '<div class="card">' + cardHead('Para você aprovar', 'destrava a próxima entrega', selo('manual')) +
        '<div class="list">' + D.pendencias.slice(0, 3).map(function (p) {
          return '<div class="list-item"><div class="li-ico" style="color:var(--accent-2)">→</div>' +
            '<div class="li-body"><h4>' + esc(p.titulo) + '</h4><p>' + esc(p.desc) + '</p></div>' +
            badge(p.urgencia) + '</div>';
        }).join('') + '</div>' +
        '<button class="btn btn-ghost btn-sm" style="margin-top:14px" data-goto="pendencias">Ver e resolver</button></div>';
    }
    h += '</div>';

    /* entregas + próximos passos */
    h += '<div class="grid g-2">';
    if (D.entregas && D.entregas.length) {
      var andamento = D.entregas.filter(function (e) { return e.status !== 'concluido'; }).slice(0, 4);
      var feitas = D.entregas.filter(function (e) { return e.status === 'concluido'; }).length;
      h += '<div class="card">' + cardHead('Entregas do mês', feitas + ' de ' + D.entregas.length + ' concluídas', selo('manual')) +
        '<div class="prog mb-16"><i style="width:' + ((feitas / D.entregas.length) * 100).toFixed(0) + '%"></i></div>' +
        '<div class="timeline">' + (andamento.length ? andamento : D.entregas.slice(-3)).map(itemTimeline).join('') + '</div>' +
        '<button class="btn btn-ghost btn-sm" style="margin-top:16px" data-goto="entregas">Ver todas as entregas</button></div>';
    }

            '<td>' + esc(c.papel) + '</td><td>' + tag(c.status, 'b-green') + '</td></tr>';
        }).join('') + '</tbody></table></div>' +
        '<div class="insight" style="margin-top:18px"><div class="ico">◆</div><div>' +
        '<h4>As contas são suas, não nossas</h4>' +
        '<p>Todas as plataformas acima estão registradas no nome da sua empresa. A Zync entra como administradora. ' +
        'Se um dia a parceria terminar, você mantém o histórico, os públicos e os dados — sem depender de ninguém para recuperar nada.</p>' +
        '</div></div></div>';
    }
    return h;
  }
},

];

/* ---------- helpers de render compartilhados ---------- */

function itemTimeline(e) {
  var cls = e.status === 'concluido' ? 'done' : (e.status === 'andamento' ? 'doing' : '');
  return '<div class="tl-item ' + cls + '">' +
    '<div class="tl-head"><h4>' + esc(e.titulo) + '</h4>' + badge(e.status) +
    '<span class="tl-date">' + F.data(e.prazo) + '</span></div>' +
    '<p>' + esc(e.desc) + '</p></div>';
}

function funilHTML(funil) {
  var max = funil[0].valor || 1;
  return '<div class="funnel">' + funil.map(function (f, i) {
    // escala de potência: sem isso, etapas finais somem ao lado das impressões
    var w = Math.max(14, Math.pow(f.valor / max, 0.32) * 100);
    var conv = i > 0 && funil[i - 1].valor
      ? ((f.valor / funil[i - 1].valor) * 100) : null;
    return '<div class="fn-step">' +
      '<div class="fn-bar" style="width:' + w.toFixed(1) + '%">' + F.num(f.valor) + '</div>' +
      '<div class="fn-meta">' + esc(f.etapa) +
      (conv != null ? ' <span class="fn-conv">' + conv.toFixed(1).replace('.', ',') + '% da etapa anterior</span>' : '') +
      '</div></div>';
  }).join('') + '</div>';
}

/* ============================================================
   NAVEGAÇÃO
   ============================================================ */

var ativas = [];
var naoContratados = [];

function montaNav() {
  /* Módulo de serviço não contratado NÃO vira aba vazia: o portal só
     mostra o que existe. A oferta vai para uma linha do rodapé. */
  ativas = PAGINAS.filter(function (p) { return p.sempre || (p.tem && p.tem()); });

  naoContratados = PAGINAS.filter(function (p) {
    return !p.sempre && p.oferta && !(p.tem && p.tem());
  }).map(function (p) { return p.oferta; });

  var grupos = [];
  ativas.forEach(function (p) {
    var g = grupos.filter(function (x) { return x.nome === p.grupo; })[0];
    if (!g) { g = { nome: p.grupo, itens: [] }; grupos.push(g); }
    g.itens.push(p);
  });

  el('sbNav').innerHTML = grupos.map(function (g) {
    return '<div class="sb-group">' + esc(g.nome) + '</div>' + g.itens.map(function (p) {
      var n = p.badge ? p.badge() : 0;
      return '<button class="sb-link" data-goto="' + p.id + '">' +
        '<svg class="ico"><use href="#' + p.icone + '"/></svg>' + esc(p.titulo) +
        (n ? '<span class="sb-badge">' + n + '</span>' : '') + '</button>';
    }).join('');
  }).join('');
}

function abrir(id) {
  var p = ativas.filter(function (x) { return x.id === id; })[0] || ativas[0];
  el('tbTitle').textContent = p.titulo;

  var html;
  try {
    html = p.render();
  } catch (err) {
    html = vazio('Não conseguimos carregar este bloco agora. O time da Zync já foi avisado.');
  }
  el('content').innerHTML = '<div class="page active">' + html + rodape() + '</div>';

  Array.prototype.forEach.call(document.querySelectorAll('.sb-link[data-goto]'), function (b) {
    b.classList.toggle('active', b.getAttribute('data-goto') === p.id);
  });

  if (location.hash.slice(1) !== p.id) history.replaceState(null, '', '#' + p.id);
  fechaMenu();
  window.scrollTo(0, 0);
}

function fechaMenu() {
  el('sidebar').classList.remove('open');
  el('scrim').classList.remove('on');
}

document.addEventListener('click', function (e) {
  var alvo = e.target.closest('[data-goto]');
  if (alvo) { e.preventDefault(); abrir(alvo.getAttribute('data-goto')); return; }

  var rev = e.target.closest('[data-revelar]');
  if (rev) {
    e.preventDefault();
    var i = parseInt(rev.getAttribute('data-revelar'), 10);
    rev.disabled = true;
    rev.textContent = '…';
    ZyncData.revelarTelefone(i).then(function (r) {
      var cel = document.querySelector('[data-fone="' + i + '"]');
      if (!cel) return;
      if (!r.ok) { rev.disabled = false; rev.textContent = 'tentar de novo'; return; }
      cel.textContent = r.fone;
      aviso('Acesso registrado. A revelação deste contato ficou no log da conta.');
    });
    return;
  }

  var corr = e.target.closest('[data-corrigir]');
  if (corr) {
    e.preventDefault();
    var idx = parseInt(corr.getAttribute('data-corrigir'), 10);
    var c = D.agente_ia.conversas_recentes[idx];
    var msg = 'Olá! Quero corrigir uma resposta do agente de IA.\n\n' +
              'Pergunta do cliente: "' + c.pergunta + '"\n' +
              'Resposta do agente: "' + c.resposta + '"\n\n' +
              'O certo seria: ';
    window.open('https://wa.me/' + CFG.suporte.whatsapp + '?text=' + encodeURIComponent(msg), '_blank', 'noopener');
    return;
  }
});

var timerAviso;
function aviso(txt) {
  var t = el('toast');
  t.textContent = txt;
  t.classList.add('show');
  clearTimeout(timerAviso);
  timerAviso = setTimeout(function () { t.classList.remove('show'); }, 4200);
}
el('burger').addEventListener('click', function () {
  el('sidebar').classList.add('open');
  el('scrim').classList.add('on');
});
el('scrim').addEventListener('click', fechaMenu);
el('btnSair').addEventListener('click', function () { ZyncAuth.sair(); });
window.addEventListener('hashchange', function () {
  var id = location.hash.slice(1);
  if (id) abrir(id);
});

/* ============================================================
   BOOT
   ============================================================ */

ZyncAuth.exigirSessao()
  .then(function (sessao) { return ZyncData.carregar(sessao); })
  .then(function (dados) {
    D = dados;

    el('sbAvatar').textContent = D.cliente.iniciais || '··';
    el('sbEmpresa').textContent = D.cliente.empresa || D.cliente.nome || '—';
    el('sbPlano').textContent = D.cliente.plano || '—';

    var t = D.periodo && D.periodo.atualizado_em;
    el('tbSync').innerHTML = '<span class="dot"></span> ' +
      (t ? 'dados de ' + F.data(t) + ' às ' + String(t).slice(11, 16) : 'dados atualizados');

    /* Modo demonstração precisa ser inconfundível em QUALQUER print de
       tela, não só na de login: barra fixa no topo + marca d'água
       diagonal atrás de todo o conteúdo, inclusive dos gráficos. */
    if (ZyncAuth.ehDemo()) {
      var barra = document.createElement('div');
      barra.className = 'demo-bar';
      barra.textContent = 'SIMULAÇÃO · números ilustrativos para demonstração — não são resultado prometido';
      var main = document.querySelector('.main');
      main.insertBefore(barra, main.firstChild);

      var wm = document.createElement('div');
      wm.className = 'demo-wm';
      document.body.appendChild(wm);

      document.title = '[SIMULAÇÃO] ' + document.title;
    }

    montaNav();
    abrir(location.hash.slice(1) || 'visao');
  })
  .catch(function (err) {
    el('content').innerHTML =
      '<div class="alert alert-err">Não foi possível carregar os dados da sua conta. ' +
      'Tente recarregar a página — se continuar, fale com a Zync.</div>' +
      '<div style="margin-top:16px">' +
      ctaWhats('Olá! Estou com erro ao carregar a área do cliente.', 'Avisar a Zync') + '</div>';
  });

})();
</script>
